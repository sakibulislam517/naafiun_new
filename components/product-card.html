<!--
  Reusable product card partial (template for JS rendering).
  This is a reference template - actual cards are rendered by js/main.js
  To use manually, replace the data attributes and content below.
-->
<article class="group overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm transition hover:-translate-y-0.5 hover:shadow-md" data-product-card>
  <a href="./pages/product.html" class="block" data-card-link>
    <div class="aspect-[4/5] overflow-hidden rounded-t-2xl bg-slate-100 relative">
      <img
        src=""
        alt=""
        class="h-full w-full object-cover"
        loading="lazy"
        data-card-image
      />
      <span class="discount-badge absolute left-2 top-2 hidden rounded bg-rose-600 px-2 py-1 text-xs font-bold text-white" data-discount></span>
    </div>
  </a>

  <div class="p-4">
    <div class="flex items-start justify-between gap-3">
      <div>
        <p class="text-xs font-semibold text-emerald-700" data-category></p>
        <h3 class="mt-1 line-clamp-2 text-sm font-bold text-slate-900" data-title></h3>
      </div>
    </div>

    <p class="mt-2 text-xs text-slate-500"><span data-author></span> • <span data-publisher></span></p>

    <div class="mt-4 flex items-center justify-between gap-3">
      <div class="flex items-baseline gap-2">
        <p class="text-base font-extrabold text-slate-900" data-price></p>
        <p class="text-xs text-slate-400 line-through" data-original-price></p>
      </div>
      <button class="rounded-xl bg-emerald-600 px-3 py-2 text-xs font-semibold text-white hover:bg-emerald-700 focus:outline-none focus:ring-4 focus:ring-emerald-600/30" type="button" data-add-cart>
        কার্টে যোগ করুন
      </button>
    </div>
  </div>
</article>
