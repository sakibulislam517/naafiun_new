<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
  </defs>
  <!-- Arabic-inspired decorative element -->
  <g transform="translate(0, 5)">
    <path d="M35 15c-8 0-14 6-14 14s6 14 14 14 14-6 14-14-6-14-14-14z" fill="url(#logoGrad)" opacity="0.3"/>
    <path d="M55 10c-5 0-9 4-9 9s4 9 9 9 9-4 9-9-4-9-9-9z" fill="#f59e0b"/>
    <path d="M75 5c-8 0-14 6-14 14s6 14 14 14 14-6 14-14-6-14-14-14z" fill="#8b5cf6"/>
    <!-- Connecting swoosh -->
    <path d="M25 35c5-15 20-20 30-10s-5 25-15 20" stroke="url(#logoGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="55" cy="19" r="2.5" fill="white"/>
    <circle cx="75" cy="14" r="2" fill="white"/>
  </g>
  <!-- Brand name -->
  <text x="0" y="65" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#4a3d8f">naafiun</text>
  <!-- .com -->
  <text x="175" y="65" font-family="Arial, sans-serif" font-size="16" fill="#6d28d9" font-weight="bold">.com</text>
  <!-- Underline -->
  <line x1="0" y1="72" x2="175" y2="72" stroke="#6d28d9" stroke-width="2"/>
