<!DOCTYPE html>
<html>
<head><title>Naafiun Logo</title></head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="480" height="120">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>

  <text x="52" y="38" font-family="Arial Black, Arial, sans-serif" font-size="28" font-weight="900" fill="#4a3d8f">naafiun</text>
  <!-- .com -->
  <text x="195" y="38" font-family="Arial, sans-serif" font-size="14" fill="#7c3aed" font-weight="bold">.com</text>
  <!-- Underline -->
  <line x1="52" y1="48" x2="195" y2="48" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>
